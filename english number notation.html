<html>
    <head>
        <title>English number notation</title>
    </head>
    <body>
        <h1>English number notation</h1>
        <input type="number" id="input"><br>
        <input type="button" value="Convert to english number notation!" onclick="convert()">
        <p id="output"></p>
        <script>
            const input = document.getElementById("input")
            const output = document.getElementById("output")

            function toEnglishNumberNotation(numberInput) {
                let number = parseInt(numberInput)
                return number.toLocaleString('en-US');
            }

            function convert() {
                output.textContent = toEnglishNumberNotation(input.value)
            }
        </script>
    </body>
</html>
